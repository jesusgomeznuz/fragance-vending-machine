<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0" />
  <title>Fragrance Vending Machine</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="machine">
    <header class="machine__header">
      <h1>Fragrance Vending</h1>
      <div id="mode-badge" class="badge"></div>
    </header>

    <main class="machine__main">
      <p class="section-label">Select a Fragrance</p>
      <div class="carousel-wrap">
        <button id="carousel-prev" class="carousel-nav carousel-nav--prev">&#8249;</button>
        <div id="carousel" class="carousel"></div>
        <button id="carousel-next" class="carousel-nav carousel-nav--next">&#8250;</button>
      </div>
    </main>

    <footer class="machine__status">
      <div id="status-box" class="status-box">
        <p>Welcome! Select a fragrance to get started.</p>
      </div>
    </footer>
  </div>

  <!-- Panel: Product Detail -->
  <div id="panel-detail" class="panel">
    <div id="detail-hero" class="panel-hero panel-hero--img">
      <h2 id="detail-name" class="panel-hero__name"></h2>
    </div>
    <div class="panel-body">
      <p  id="detail-desc"  class="detail-desc"></p>
      <div id="detail-price" class="detail-price"></div>
      <div id="detail-stock" class="detail-stock"></div>
    </div>
    <div class="panel-actions">
      <button id="detail-back"    class="btn btn--ghost">← Back</button>
      <button id="detail-confirm" class="btn btn--pay">Select →</button>
    </div>
  </div>

  <!-- Panel: Payment Method -->
  <div id="panel-payment" class="panel">
    <div class="panel-hero panel-hero--sm">
      <p id="pay-name"  class="panel-hero__label"></p>
      <div id="pay-price" class="panel-hero__price"></div>
    </div>
    <div class="panel-body panel-body--center">
      <p class="payment-prompt">Choose payment method</p>
      <div class="payment-methods">
        <button id="pay-card" class="method-btn method-btn--card">
          <span class="method-icon">&#x1F4B3;</span>
          <span class="method-label">Card</span>
        </button>
        <button id="pay-coin" class="method-btn method-btn--coin">
          <span class="method-icon">&#x1FA99;</span>
          <span class="method-label">Cash</span>
        </button>
      </div>
    </div>
    <div class="panel-actions">
      <button id="payment-back" class="btn btn--ghost">← Back</button>
    </div>
  </div>

  <!-- Panel: Processing -->
  <div id="panel-processing" class="panel">
    <div class="panel-body panel-body--center">
      <div class="spinner spinner--lg"></div>
      <p id="processing-label"  class="processing-label">Processing payment…</p>
      <p id="processing-amount" class="processing-amount"></p>
    </div>
  </div>

  <!-- Panel: Dispense -->
  <div id="panel-dispense" class="panel">
    <div class="panel-body panel-body--center">
      <div class="dispense-check">&#x2713;</div>
      <div id="dispense-name"      class="dispense-name"></div>
      <p                           class="dispense-msg">Press the button on the machine<br>to collect your fragrance</p>
      <div id="dispense-countdown" class="dispense-countdown"></div>
    </div>
  </div>

  <!-- Hidden operator access — DEV: dashed border visible; remove before production -->
  <div id="service-zone" class="service-zone"></div>

  <script src="app.js"></script>
</body>
</html>
