<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pi Monitor — Fragrance Vending</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2a2d3a;
      --text:    #e0e0e0;
      --muted:   #888;
      --green:   #4caf50;
      --red:     #f44336;
      --yellow:  #ffc107;
      --blue:    #42a5f5;
      --purple:  #ab47bc;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .header a { color: var(--muted); text-decoration: none; font-size: 13px; }
    .header a:hover { color: var(--text); }
    .header h1 { font-size: 18px; font-weight: 600; flex: 1; }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--muted);
      transition: background .3s;
    }
    .status-dot.online  { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .status-dot.offline { background: var(--red);   box-shadow: 0 0 8px var(--red); }
    #status-label { font-size: 13px; color: var(--muted); }

    /* ── Period selector ─────────────────────────── */
    .controls {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
    }
    .period-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all .15s;
    }
    .period-btn:hover  { border-color: var(--blue); color: var(--text); }
    .period-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }
    .refresh-note { margin-left: auto; color: var(--muted); font-size: 12px; }

    /* ── Stat cards ──────────────────────────────── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      padding: 20px 24px 8px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }
    .card__label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
    .card__value { font-size: 28px; font-weight: 700; margin: 4px 0 2px; }
    .card__sub   { color: var(--muted); font-size: 12px; }
    .card__bar   { height: 4px; border-radius: 2px; background: var(--border); margin-top: 10px; overflow: hidden; }
    .card__fill  { height: 100%; border-radius: 2px; transition: width .4s; }

    .card--temp   .card__value { color: var(--yellow); }
    .card--cpu    .card__value { color: var(--blue); }
    .card--ram    .card__value { color: var(--purple); }
    .card--disk   .card__value { color: var(--green); }
    .card--uptime .card__value { color: var(--text); font-size: 20px; }

    .card--temp  .card__fill { background: var(--yellow); }
    .card--cpu   .card__fill { background: var(--blue); }
    .card--ram   .card__fill { background: var(--purple); }
    .card--disk  .card__fill { background: var(--green); }

    /* ── Offline gaps ────────────────────────────── */
    .gaps-section {
      padding: 8px 24px 0;
    }
    .gaps-section h3 { font-size: 13px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .5px; }
    .gap-pill {
      display: inline-block;
      background: #2a1a1a;
      border: 1px solid #5a2a2a;
      color: var(--red);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      margin: 2px 4px 2px 0;
    }
    .no-gaps { color: var(--green); font-size: 12px; }

    /* ── Charts ──────────────────────────────────── */
    .charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 16px 24px 24px;
    }
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }
    .chart-card h3 {
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 12px;
    }
    .chart-wrap { position: relative; height: 160px; }

    /* ── Loading / error ─────────────────────────── */
    #loading {
      text-align: center;
      padding: 60px;
      color: var(--muted);
    }

    @media (max-width: 700px) {
      .charts { grid-template-columns: 1fr; }
      .cards  { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<div class="header">
  <a href="/">← Vending</a>
  <h1>Pi Monitor</h1>
  <div class="status-dot" id="status-dot"></div>
  <span id="status-label">—</span>
</div>

<div class="controls">
  <button class="period-btn active" data-period="1h">1h</button>
  <button class="period-btn"        data-period="6h">6h</button>
  <button class="period-btn"        data-period="24h">24h</button>
  <button class="period-btn"        data-period="7d">7d</button>
  <span class="refresh-note" id="refresh-note">Auto-refresh: 30s</span>
</div>

<div id="loading">Loading metrics…</div>

<div id="content" style="display:none">
  <div class="cards">
    <div class="card card--temp">
      <div class="card__label">CPU Temp</div>
      <div class="card__value" id="v-temp">—</div>
      <div class="card__sub"   id="s-temp">—</div>
      <div class="card__bar"><div class="card__fill" id="b-temp" style="width:0%"></div></div>
    </div>
    <div class="card card--cpu">
      <div class="card__label">CPU Usage</div>
      <div class="card__value" id="v-cpu">—</div>
      <div class="card__sub"   id="s-cpu">load avg</div>
      <div class="card__bar"><div class="card__fill" id="b-cpu" style="width:0%"></div></div>
    </div>
    <div class="card card--ram">
      <div class="card__label">RAM</div>
      <div class="card__value" id="v-ram">—</div>
      <div class="card__sub"   id="s-ram">—</div>
      <div class="card__bar"><div class="card__fill" id="b-ram" style="width:0%"></div></div>
    </div>
    <div class="card card--disk">
      <div class="card__label">Disk</div>
      <div class="card__value" id="v-disk">—</div>
      <div class="card__sub"   id="s-disk">—</div>
      <div class="card__bar"><div class="card__fill" id="b-disk" style="width:0%"></div></div>
    </div>
    <div class="card card--uptime">
      <div class="card__label">Uptime</div>
      <div class="card__value" id="v-uptime">—</div>
      <div class="card__sub">since last boot</div>
    </div>
  </div>

  <div class="gaps-section">
    <h3>Offline Periods</h3>
    <div id="gaps-list"></div>
  </div>

  <div class="charts">
    <div class="chart-card">
      <h3>CPU Temperature (°C)</h3>
      <div class="chart-wrap"><canvas id="chart-temp"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>CPU Usage (%)</h3>
      <div class="chart-wrap"><canvas id="chart-cpu"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>RAM Usage (MB)</h3>
      <div class="chart-wrap"><canvas id="chart-ram"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>Load Average (1m)</h3>
      <div class="chart-wrap"><canvas id="chart-load"></canvas></div>
    </div>
  </div>
</div>

<script>
  const CHART_OPTS = (color) => ({
    responsive: true,
    maintainAspectRatio: false,
    animation: false,
    plugins: { legend: { display: false } },
    scales: {
      x: {
        ticks: { color: '#666', maxTicksLimit: 6, font: { size: 11 } },
        grid:  { color: '#1e2130' },
      },
      y: {
        ticks: { color: '#666', font: { size: 11 } },
        grid:  { color: '#1e2130' },
      },
    },
    elements: { point: { radius: 0 }, line: { tension: 0.3, borderWidth: 2 } },
  });

  function makeChart(id, color) {
    const ctx = document.getElementById(id).getContext('2d');
    return new Chart(ctx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [{ data: [], borderColor: color, backgroundColor: color + '18', fill: true }],
      },
      options: CHART_OPTS(color),
    });
  }

  const charts = {
    temp: makeChart('chart-temp', '#ffc107'),
    cpu:  makeChart('chart-cpu',  '#42a5f5'),
    ram:  makeChart('chart-ram',  '#ab47bc'),
    load: makeChart('chart-load', '#4caf50'),
  };

  function fmtTime(ts) {
    const d = new Date(ts.replace(' ', 'T') + 'Z');
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function fmtUptime(s) {
    if (s == null) return '—';
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    if (h > 24) return `${Math.floor(h/24)}d ${h%24}h`;
    if (h > 0)  return `${h}h ${m}m`;
    return `${m}m`;
  }

  function updateChart(chart, labels, data) {
    chart.data.labels = labels;
    chart.data.datasets[0].data = data;
    chart.update('none');
  }

  let currentPeriod = '1h';
  let refreshTimer;

  async function loadMetrics() {
    try {
      const res  = await fetch(`/metrics?period=${currentPeriod}`);
      const data = await res.json();

      document.getElementById('loading').style.display  = 'none';
      document.getElementById('content').style.display  = 'block';

      // Status
      const dot   = document.getElementById('status-dot');
      const label = document.getElementById('status-label');
      if (data.is_online) {
        dot.className = 'status-dot online';
        label.textContent = 'Online';
        label.style.color = '#4caf50';
      } else {
        dot.className = 'status-dot offline';
        label.textContent = 'Offline';
        label.style.color = '#f44336';
      }

      // Latest values
      const l = data.latest;
      if (l) {
        // Temp
        const temp = l.cpu_temp_c;
        document.getElementById('v-temp').textContent = temp != null ? `${temp}°C` : '—';
        document.getElementById('s-temp').textContent = temp != null
          ? (temp < 50 ? 'Cool' : temp < 70 ? 'Warm' : 'Hot!') : '—';
        document.getElementById('b-temp').style.width = temp != null ? `${Math.min(temp/85*100,100)}%` : '0%';

        // CPU
        const cpu = l.cpu_usage_pct;
        document.getElementById('v-cpu').textContent = cpu != null ? `${cpu}%` : '—';
        document.getElementById('s-cpu').textContent = l.cpu_load_1m != null ? `load ${l.cpu_load_1m}` : 'load avg';
        document.getElementById('b-cpu').style.width = cpu != null ? `${cpu}%` : '0%';

        // RAM
        const ramTotal = l.mem_total_mb;
        const ramUsed  = l.mem_used_mb;
        const ramPct   = (ramTotal && ramUsed) ? Math.round(ramUsed / ramTotal * 100) : null;
        document.getElementById('v-ram').textContent = ramPct != null ? `${ramPct}%` : '—';
        document.getElementById('s-ram').textContent = (ramUsed && ramTotal)
          ? `${Math.round(ramUsed)}/${Math.round(ramTotal)} MB` : '—';
        document.getElementById('b-ram').style.width = ramPct != null ? `${ramPct}%` : '0%';

        // Disk
        const diskTotal = l.disk_total_gb;
        const diskUsed  = l.disk_used_gb;
        const diskPct   = (diskTotal && diskUsed) ? Math.round(diskUsed / diskTotal * 100) : null;
        document.getElementById('v-disk').textContent = diskPct != null ? `${diskPct}%` : '—';
        document.getElementById('s-disk').textContent = (diskUsed && diskTotal)
          ? `${diskUsed}/${diskTotal} GB` : '—';
        document.getElementById('b-disk').style.width = diskPct != null ? `${diskPct}%` : '0%';

        // Uptime
        document.getElementById('v-uptime').textContent = fmtUptime(l.uptime_s);
      }

      // Charts
      const labels = data.metrics.map(r => fmtTime(r.timestamp));
      updateChart(charts.temp, labels, data.metrics.map(r => r.cpu_temp_c));
      updateChart(charts.cpu,  labels, data.metrics.map(r => r.cpu_usage_pct));
      updateChart(charts.ram,  labels, data.metrics.map(r => r.mem_used_mb));
      updateChart(charts.load, labels, data.metrics.map(r => r.cpu_load_1m));

      // Offline gaps
      const gapsList = document.getElementById('gaps-list');
      if (data.offline_gaps.length === 0) {
        gapsList.innerHTML = '<span class="no-gaps">No offline periods in this window</span>';
      } else {
        gapsList.innerHTML = data.offline_gaps.map(g =>
          `<span class="gap-pill">
            ${fmtTime(g.from)} → ${fmtTime(g.to)}
            &nbsp;(${g.duration_min} min)
          </span>`
        ).join('');
      }

      // Refresh note
      const now = new Date();
      document.getElementById('refresh-note').textContent =
        `Updated ${now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'})} · auto 30s`;

    } catch (err) {
      console.error('Metrics fetch error:', err);
    }
  }

  // Period selector
  document.querySelectorAll('.period-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentPeriod = btn.dataset.period;
      loadMetrics();
    });
  });

  // Auto refresh
  loadMetrics();
  refreshTimer = setInterval(loadMetrics, 30_000);
</script>
</body>
</html>
